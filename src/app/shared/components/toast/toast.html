<div
  class="fixed bottom-24 right-6 z-[9999] flex flex-col gap-3 max-w-[380px] w-full pointer-events-none"
>
  @for (toast of toastService.toasts(); track toast.id) {
    <div
      class="toast-card pointer-events-auto relative flex items-start gap-3 p-3.5 rounded-2xl border border-[color-mix(in_srgb,var(--color-gold-500)_20%,transparent)] border-l-4 bg-white/95 dark:bg-[#0a1714]/95 backdrop-blur-md shadow-lg overflow-hidden animate-[toast-slide-in_0.35s_cubic-bezier(0.21,1.02,0.73,1)_forwards]"
      [style.border-left-color]="borderColor(toast.type)"
    >
      <div
        class="flex-shrink-0 text-[1.15rem] font-bold mt-0.5"
        [style.color]="borderColor(toast.type)"
      >
        {{ icon(toast.type) }}
      </div>

      <div class="flex-1 flex flex-col gap-1 min-w-0">
        <span
          class="font-sans font-semibold text-sm leading-tight text-slate-900 dark:text-[var(--color-ivory)]"
        >
          {{ toast.title }}
        </span>
        <span
          class="font-sans text-xs leading-normal text-slate-600 dark:text-[color-mix(in_srgb,var(--color-ivory)_80%,transparent)] break-words"
        >
          {{ toast.message }}
        </span>
      </div>

      <button
        class="flex-shrink-0 bg-transparent border-none cursor-pointer text-xs p-0.5 text-slate-400 hover:text-slate-700 dark:text-slate-500 dark:hover:text-[var(--color-ivory)] transition-colors duration-150 -mt-0.5"
        (click)="toastService.dismiss(toast.id)"
      >
        ✕
      </button>

      @if (toast.duration > 0) {
        <div class="absolute bottom-0 left-0 right-0 h-[3px] bg-black/5 dark:bg-white/5">
          <div
            class="toast-progress-bar h-full w-full origin-left animate-[toast-progress-shrink_linear_forwards] rounded-b-2xl"
            [style.background]="borderColor(toast.type)"
            [style.animation-duration.ms]="toast.duration"
          ></div>
        </div>
      }
    </div>
  }
</div>
