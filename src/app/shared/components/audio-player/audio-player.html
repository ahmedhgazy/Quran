@if (player.currentTrack()) {
<div
  class="fixed bottom-0 inset-x-0 z-50 glass bg-white/85 dark:bg-[var(--color-night-900)]/85 border-t border-[var(--color-gold-500)]/25"
>
  <div class="max-w-5xl mx-auto px-4 py-3 flex items-center gap-4">
    <button
      (click)="player.togglePlayPause()"
      class="w-10 h-10 rounded-full bg-gradient-to-br from-[var(--color-emeraldx-700)] to-[var(--color-emeraldx-500)] text-white shadow-lg shadow-[var(--color-emeraldx-600)]/30 flex items-center justify-center"
      [attr.aria-label]="player.isPlaying() ? 'Pause' : 'Play'"
    >
      {{ player.isPlaying() ? '⏸' : '▶' }}
    </button>

    <div class="flex-1 min-w-0">
      <div class="flex justify-between text-[11px] mb-1.5">
        <span
          class="font-medium text-[var(--color-night-900)] dark:text-[var(--color-ivory)] truncate"
        >
          {{ player.currentTrack()!.title }} · {{ player.currentTrack()!.reciter }}
        </span>
        <span class="text-slate-400 shrink-0 ml-2"
          >{{ player.formattedTime() }} / {{ player.formattedDuration() }}</span
        >
      </div>
      <div
        dir="ltr"
        class="h-1.5 rounded-full bg-[var(--color-night-900)]/10 dark:bg-[var(--color-ivory)]/10 cursor-pointer overflow-hidden"
        role="slider"
        [attr.aria-valuenow]="player.progress()"
        aria-valuemin="0"
        aria-valuemax="100"
        aria-label="Audio progress"
        tabindex="0"
        (click)="onSeek($event)"
      >
        <div
          class="h-full rounded-full bg-gradient-to-r from-[var(--color-emeraldx-600)] to-[var(--color-gold-500)] transition-all"
          [style.width.%]="player.progress()"
        ></div>
      </div>
    </div>

    <button
      (click)="cycleSpeed()"
      class="text-xs px-3 py-1.5 rounded-full border border-[var(--color-gold-500)]/40 text-[var(--color-gold-600)] shrink-0"
      aria-label="Playback speed"
    >
      {{ speed() }}×
    </button>

    <button
      (click)="player.stop()"
      class="text-[var(--color-gold-600)] hover:text-red-400 shrink-0"
      aria-label="Close player"
    >
      ✕
    </button>
  </div>
</div>
}
